services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: epitesz_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:///./data/epitesz.db
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:80}
      - UPLOAD_DIR=/app/uploads
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - backend_data:/app/data
      - uploads_data:/app/uploads
    networks:
      - epitesz_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: epitesz_frontend
    restart: unless-stopped
    networks:
      - epitesz_net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: epitesz_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - epitesz_net
    depends_on:
      - frontend
      - backend

volumes:
  backend_data:
  uploads_data:

networks:
  epitesz_net:
    driver: bridge
